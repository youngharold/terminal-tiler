name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: swift --version

      - name: Build (release, warnings-as-errors)
        run: swift build -c release -Xswiftc -warnings-as-errors

      - name: Run tests
        run: swift test -Xswiftc -warnings-as-errors
